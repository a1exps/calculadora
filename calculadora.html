<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora com Tailwind CSS</title>
    <!-- Incluir biblioteca CDN Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Incluir biblioteca CDN Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>

<body class="bg-gray-800 min-h-screen flex items-center justify-center">

    <!-- Início da calculadora -->
    <div class="w-100 p-4 bg-gray-700 rounded-lg text-shadow-lg">
        <p class="text-white">xLing</p>

        <!-- Display -->
        <div class="w-full bg-gray-900 text-white text-right text-4xl p-4" id="display">
            0
        </div>

        <!-- Botões -->
        <div class="w-full flex flex-wrap py-4">

            <!-- Linha 1 -->
            <div class="w-1/4 p-2">
                <button value="%" class="w-full bg-amber-400 text-white text-center py-3 rounded hover:bg-gray-500"><i
                        class="bi bi-percent"></i></button>
            </div>
            <div class="w-2/4 p-2">
                <button value="C"
                    class="w-full bg-red-400 text-white text-center py-3 rounded hover:bg-gray-500">C</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="backspace"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500"><i
                        class="bi bi-backspace"></i></button>
            </div>

            <!-- Linha 2 -->
            <div class="w-1/4 p-2">
                <button value="7"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">7</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="8"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">8</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="9"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">9</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="/"
                    class="w-full bg-amber-400 text-white text-center py-3 rounded hover:bg-gray-500">÷</button>
            </div>

            <!-- Linha 3 -->
            <div class="w-1/4 p-2">
                <button value="4"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">4</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="5"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">5</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="6"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">6</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="*"
                    class="w-full bg-amber-400 text-white text-center py-3 rounded hover:bg-gray-500">x</button>
            </div>

            <!-- Linha 4 -->
            <div class="w-1/4 p-2">
                <button value="1"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">1</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="2"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">2</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="3"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">3</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="-"
                    class="w-full bg-amber-400 text-white text-center py-3 rounded hover:bg-gray-500">-</button>
            </div>

            <!-- Linha 5 -->
            <div class="w-2/4 p-2">
                <button value="0"
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">0</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="."
                    class="w-full bg-gray-600 text-white text-center py-3 rounded hover:bg-gray-500">.</button>
            </div>
            <div class="w-1/4 p-2">
                <button value="+"
                    class="w-full bg-amber-400 text-white text-center py-3 rounded hover:bg-gray-500">+</button>
            </div>

            <!-- Linha 6 -->
            <div class="w-full p-2">
                <button value="="
                    class="w-full bg-green-400 text-white text-center py-3 rounded hover:bg-gray-500">=</button>
            </div>
        </div>
    </div>
    <script src="calculadora.js"></script>

</body>

</html>
